name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with black
        run: black --check .

      - name: Lint with isort
        run: isort --check-only --profile black .

      - name: Lint with flake8
        run: flake8 --max-line-length=100 --exclude=.venv,__pycache__,data,checkpoints,runs,results .

      - name: Run pytest
        run: |
          if [ -d tests ]; then pytest; else echo "No tests directory, skipping pytest"; fi

      - name: Smoke test - 1 epoch training
        run: |
          python train.py \
            --model resnet20 \
            --dataset cifar10 \
            --epochs 1 \
            --batch_size 4 \
            --num_workers 0 \
            --data_dir ./data
