# Default configuration for training ResNet-20 on CIFAR-10.
# Override any key via command-line arguments, e.g.:
#   python train.py --config configs/resnet20.yaml --epochs 10 --use_cutout

model: resnet20
dataset: cifar10
epochs: 200
batch_size: 128
lr: 0.1
lr_scheduler: cosine
milestones: [82, 123]
gamma: 0.1
use_cutout: false
cutout_length: 16
label_smoothing: 0.0
num_workers: 4
data_dir: ./data
checkpoint_dir: checkpoints
run_dir: runs
